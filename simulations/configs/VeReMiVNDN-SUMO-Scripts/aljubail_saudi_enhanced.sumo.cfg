<?xml version="1.0" encoding="UTF-8"?>
<!--
    VeReMiVNDN - Enhanced SUMO Configuration for Aljubail Map

    This configuration includes:
    - Multiple vehicle types (cars, buses, trucks, bicycles, pedestrians)
    - Advanced GUI visualization
    - Colored road sections and zones
    - Realistic traffic patterns
    - Advanced routing and rerouting
-->
<configuration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="http://sumo.dlr.de/xsd/sumoConfiguration.xsd">

    <!-- =============================================== -->
    <!-- INPUT FILES -->
    <!-- =============================================== -->
    <input>
        <!-- Network file -->
        <net-file value="aljubail_saudi.net.xml"/>

        <!-- Route files (vehicle types must be loaded first) -->
        <route-files value="vTypes.add.xml,aljubail_saudi.rou.xml"/>

        <!-- Additional files (polygons, POIs) -->
        <additional-files value="aljubail_zones.poly.xml"/>
    </input>

    <!-- =============================================== -->
    <!-- TIME SETTINGS -->
    <!-- =============================================== -->
    <time>
        <begin value="0"/>
        <end value="300"/>
        <step-length value="0.1"/>
    </time>

    <!-- =============================================== -->
    <!-- PROCESSING OPTIONS -->
    <!-- =============================================== -->
    <processing>
        <!-- Collision handling -->
        <collision.action value="warn"/>
        <collision.check-junctions value="true"/>
        <collision.mingap-factor value="1.0"/>

        <!-- Teleportation (disabled for realism) -->
        <time-to-teleport value="-1"/>
        <time-to-teleport.highways value="-1"/>

        <!-- Max depart delay -->
        <max-depart-delay value="300"/>

        <!-- Lateral resolution -->
        <lateral-resolution value="0.8"/>

        <!-- Pedestrian model -->
        <pedestrian.model value="striping"/>
        <pedestrian.striping.stripe-width value="0.65"/>
        <pedestrian.striping.dawdling value="0.2"/>

        <!-- Ignore route errors -->
        <ignore-route-errors value="false"/>
    </processing>

    <!-- =============================================== -->
    <!-- ROUTING OPTIONS -->
    <!-- =============================================== -->
    <routing>
        <!-- Device assignment -->
        <device.rerouting.probability value="0.7"/>
        <device.rerouting.adaptation-steps value="180"/>
        <device.rerouting.adaptation-interval value="10"/>
        <device.rerouting.with-taz value="false"/>

        <!-- Routing algorithm -->
        <routing-algorithm value="dijkstra"/>

        <!-- Alternative routes -->
        <device.rerouting.pre-period value="60"/>
    </routing>

    <!-- =============================================== -->
    <!-- REPORT OPTIONS -->
    <!-- =============================================== -->
    <report>
        <!-- Verbosity -->
        <verbose value="true"/>
        <no-step-log value="true"/>
        <no-warnings value="false"/>

        <!-- Statistics output -->
        <duration-log.statistics value="true"/>
        <duration-log.disable value="false"/>

        <!-- Error handling -->
        <error-log value="sumo_errors.log"/>
    </report>

    <!-- =============================================== -->
    <!-- EMISSIONS (Environmental Impact) -->
    <!-- =============================================== -->
    <emissions>
        <device.emissions.probability value="1.0"/>
    </emissions>

    <!-- =============================================== -->
    <!-- GUI SETTINGS (for SUMO-GUI) -->
    <!-- =============================================== -->
    <gui_only>
        <!-- GUI settings file -->
        <gui-settings-file value="aljubail_saudi_advanced.gui.xml"/>

        <!-- Start with GUI in tracking mode -->
        <start value="true"/>
        <quit-on-end value="false"/>

        <!-- Window settings -->
        <window-size value="1920,1080"/>
        <window-pos value="50,50"/>

        <!-- Delay between steps (ms) -->
        <delay value="40"/>

        <!-- Breakpoint file (for debugging) -->
        <!-- <breakpoints-file value="breakpoints.txt"/> -->
    </gui_only>

    <!-- =============================================== -->
    <!-- OUTPUT FILES -->
    <!-- =============================================== -->
    <output>
        <!-- Summary output -->
        <summary-output value="aljubail_summary.xml"/>

        <!-- Trip information -->
        <tripinfo-output value="aljubail_tripinfo.xml"/>
        <tripinfo-output.write-unfinished value="true"/>

        <!-- Vehicle routes output -->
        <vehroute-output value="aljubail_vehroutes.xml"/>
        <vehroute-output.write-unfinished value="true"/>

        <!-- Statistical output -->
        <statistic-output value="aljubail_statistics.xml"/>

        <!-- Emissions output -->
        <!-- <emission-output value="aljubail_emissions.xml"/> -->

        <!-- Full output (warning: large files!) -->
        <!-- <full-output value="aljubail_full.xml"/> -->

        <!-- Net state dump (optional, for analysis) -->
        <!-- <netstate-dump value="aljubail_netstate.xml"/> -->
        <!-- <netstate-dump.precision value="2"/> -->
    </output>

    <!-- =============================================== -->
    <!-- RANDOM NUMBER GENERATION -->
    <!-- =============================================== -->
    <random_number>
        <seed value="42"/>
        <random value="false"/>
    </random_number>

</configuration>
