#
# VeReMiVNDN - Main OMNeT++ Configuration File
#
# This file contains all simulation configurations for:
# - Basic VNDN scenarios
# - Attack scenarios (20 types)
# - IDS evaluation scenarios
#

[General]
# OMNeT++ configuration
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 10s

# Simulation time
sim-time-limit = 500s
warmup-period = 30s

# Network
network = veremivndn.simulations.scenarios.VndnNetwork

# Playground size (for Al-Jubail map: 13.4km x 14.8km)
*.playgroundSizeX = 15000m
*.playgroundSizeY = 16000m
*.playgroundSizeZ = 50m

# Random number generation
num-rngs = 3
seed-set = ${runnumber}
**.mobility.rng-0 = 1
**.wlan[*].radio.radioMedium.rng-0 = 2

# Output vectors/scalars
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
eventlog-file = ${resultdir}/${configname}-${runnumber}.elog

# Result recording
**.result-recording-modes = +vector,+stats
*.*.vector-recording = true
*.*.scalar-recording = true

# Visualization (for Qtenv)
*.visualizer.*.displayModuleName = true
*.visualizer.*.displayCommunicationRange = true
*.visualizer.*.communicationRange = 5000m

#
# VEINS / TraCI Configuration (SUMO Integration)
#
*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("../scenarios/sumo/aljubail_saudi.launchd.xml")
*.manager.moduleType = "veremivndn.vndn.node.VndnVehicle"
*.manager.moduleName = "vehicle"
*.manager.moduleDisplayString = ""

#
# Connection Manager (Communication Range)
#
*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 500m
*.connectionManager.drawMaxIntfDist = false
*.connectionManager.pMax = 20mW
*.connectionManager.sat = -89dBm
*.connectionManager.alpha = 2.0
*.connectionManager.carrierFrequency = 5.890e9 Hz

#
# World Utility
#
*.world.useTorus = false
*.world.use2D = false

#
# Vehicle Configuration
#
*.vehicle[*].applicationType = "VndnVehicle"
*.vehicle[*].mobilityType = "TraCIMobility"

# Node identification
*.vehicle[*].nodeId = index

# Mobility parameters (overridden by SUMO/TraCI)
*.vehicle[*].mobility.x = 0
*.vehicle[*].mobility.y = 0
*.vehicle[*].mobility.z = 0

# NDN Node Parameters
*.vehicle[*].pitMaxSize = 1000
*.vehicle[*].fibMaxSize = 500
*.vehicle[*].csMaxSize = 100  # MB
*.vehicle[*].forwardingStrategy = "BestRoute"

# Cache Configuration
*.vehicle[*].cacheReplacementPolicy = "LRU"
*.vehicle[*].enableCaching = true

# Security
*.vehicle[*].enableSignatureVerification = true
*.vehicle[*].signatureVerificationDelay = 1ms

# Communication
*.vehicle[*].communicationRange = 500m
*.vehicle[*].beaconInterval = 0.1s

# Trust
*.vehicle[*].initialTrustScore = 1.0
*.vehicle[*].useTrustModel = true

# IDS Configuration
*.vehicle[*].hasIDSModule = true
*.vehicle[*].idsDetectionMethod = "Hybrid"
*.vehicle[*].idsDetectionThreshold = 0.7
*.vehicle[*].idsLogging = true

# Feature Extractor Configuration
*.vehicle[*].featureExtractor.extractionInterval = 1s
*.vehicle[*].featureExtractor.timeWindowSize = 10s
*.vehicle[*].featureExtractor.maxHistorySize = 100
*.vehicle[*].featureExtractor.enableRealTimeExtraction = true

# Data Collector Configuration
*.vehicle[*].dataCollector.outputFormat = "csv"
*.vehicle[*].dataCollector.outputDirectory = "datasets"
*.vehicle[*].dataCollector.datasetName = "vndn_attack_dataset"
*.vehicle[*].dataCollector.realtimeExport = false
*.vehicle[*].dataCollector.collectionInterval = 1s
*.vehicle[*].dataCollector.exportInterval = 60s
*.vehicle[*].dataCollector.bufferSize = 1000
*.vehicle[*].dataCollector.includeHeader = true
*.vehicle[*].dataCollector.normalizeFeatures = false

# NIC Configuration (802.11p)
*.vehicle[*].nic.mac1609_4.useServiceChannel = false
*.vehicle[*].nic.mac1609_4.txPower = 20mW
*.vehicle[*].nic.mac1609_4.bitrate = 6Mbps
*.vehicle[*].nic.mac1609_4.useAcks = false

*.vehicle[*].nic.phy80211p.minPowerLevel = -110dBm
*.vehicle[*].nic.phy80211p.useNoiseFloor = true
*.vehicle[*].nic.phy80211p.noiseFloor = -98dBm
*.vehicle[*].nic.phy80211p.decider = xmldoc("config.xml")
*.vehicle[*].nic.phy80211p.analogueModels = xmldoc("config.xml")
*.vehicle[*].nic.phy80211p.usePropagationDelay = true
*.vehicle[*].nic.phy80211p.antennaOffsetY = 0m
*.vehicle[*].nic.phy80211p.antennaOffsetZ = 1.895m

#
# RSU Configuration
#
*.rsu[*].nodeId = 1000 + index
# RSUs are stationary - coordinates set for Al-Jubail map (13.4km x 14.8km)
# Distributed across the map for optimal coverage
*.rsu[0].mobility.x = 3361
*.rsu[0].mobility.y = 3690
*.rsu[0].mobility.z = 10
*.rsu[1].mobility.x = 10083
*.rsu[1].mobility.y = 3690
*.rsu[1].mobility.z = 10
*.rsu[2].mobility.x = 6722
*.rsu[2].mobility.y = 7380
*.rsu[2].mobility.z = 10
*.rsu[3].mobility.x = 3361
*.rsu[3].mobility.y = 11070
*.rsu[3].mobility.z = 10
*.rsu[4].mobility.x = 10083
*.rsu[4].mobility.y = 11070
*.rsu[4].mobility.z = 10

*.rsu[*].pitMaxSize = 5000
*.rsu[*].fibMaxSize = 2000
*.rsu[*].csMaxSize = 1000  # MB (larger cache)
*.rsu[*].forwardingStrategy = "Multicast"

*.rsu[*].producedPrefixes = "/traffic,/safety,/info"
*.rsu[*].contentUpdateInterval = 1s

# RSU NIC Configuration (802.11p)
*.rsu[*].nic.mac1609_4.useServiceChannel = false
*.rsu[*].nic.mac1609_4.txPower = 20mW
*.rsu[*].nic.mac1609_4.bitrate = 6Mbps
*.rsu[*].nic.mac1609_4.useAcks = false

*.rsu[*].nic.phy80211p.minPowerLevel = -110dBm
*.rsu[*].nic.phy80211p.useNoiseFloor = true
*.rsu[*].nic.phy80211p.noiseFloor = -98dBm
*.rsu[*].nic.phy80211p.decider = xmldoc("config.xml")
*.rsu[*].nic.phy80211p.analogueModels = xmldoc("config.xml")
*.rsu[*].nic.phy80211p.usePropagationDelay = true
*.rsu[*].nic.phy80211p.antennaOffsetY = 0m
*.rsu[*].nic.phy80211p.antennaOffsetZ = 0m

# Applications
*.rsu[*].hasIDSModule = true
*.rsu[*].idsLogging = true

#
# Statistics Recording
#
*.vehicle[*].*.scalar-recording = true
*.vehicle[*].*.vector-recording = true

# NDN Statistics
*.vehicle[*].interestSent.result-recording-modes = +vector,+count
*.vehicle[*].interestReceived.result-recording-modes = +vector,+count
*.vehicle[*].dataSent.result-recording-modes = +vector,+count
*.vehicle[*].dataReceived.result-recording-modes = +vector,+count
*.vehicle[*].cacheHit.result-recording-modes = +vector,+count
*.vehicle[*].cacheMiss.result-recording-modes = +vector,+count

# Attack/IDS Statistics
*.vehicle[*].attackDetected.result-recording-modes = +vector,+count,+sum
*.vehicle[*].trustScore.result-recording-modes = +vector,+stats

######################################################################
# Configuration Sections
######################################################################

#
# [Config BasicVNDN]
# Basic VNDN scenario without attacks (baseline)
#
[Config BasicVNDN]
description = "Basic VNDN scenario - No attacks (Baseline)"
*.numVehicles = 50
*.numRSU = 5
*.vehicle[*].hasAttackModule = false

#
# [Config BenignTraffic]
# High-density benign traffic for dataset generation
#
[Config BenignTraffic]
extends = BasicVNDN
description = "Benign traffic scenario for baseline dataset"
*.numVehicles = 200
*.numRSU = 10
sim-time-limit = 500s

# Applications
*.vehicle[*].isContentProducer = uniform(0,1) < 0.3  # 30% producers
*.vehicle[*].producedPrefixes = "safety,traffic,infotainment"


######################################################################
# ATTACK SCENARIOS
######################################################################

#
# [Config AttackScenario_Base]
# Base configuration for all attack scenarios
#
[Config AttackScenario_Base]
extends = BasicVNDN
*.numMaliciousVehicles = 10
*.vehicle[0..9].hasAttackModule = true
*.vehicle[0..9].attackStartTime = 60s
*.vehicle[0..9].attackDuration = 180s
*.vehicle[0..9].attackIntensity = 0.4

#
# Attack #1: Interest Flooding
#
[Config Attack01_InterestFlooding]
extends = AttackScenario_Base
description = "Attack #1: Interest Flooding (IF) - PIT Exhaustion"
*.vehicle[0..9].attackType = "InterestFlooding"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.networks.InterestFlooding"
*.vehicle[0..9].attackParameters = "{\"targetPrefix\":\"/safety\", \"floodRate\":100, \"nonExistent\":true}"

#
# Attack #2: Content Poisoning
#
[Config Attack02_ContentPoisoning]
extends = AttackScenario_Base
description = "Attack #2: Content Poisoning - Fake Data Injection"
*.vehicle[0..9].attackType = "ContentPoisoning"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.data.ContentPoisoning"
*.vehicle[0..9].attackParameters = "{\"targetPrefix\":\"/traffic\", \"poisonProbability\":0.8}"

#
# Attack #3: Cache Pollution
#
[Config Attack03_CachePollution]
extends = AttackScenario_Base
description = "Attack #3: Cache Pollution - Popularity Manipulation"
*.vehicle[0..9].attackType = "CachePollution"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.caching.CachePollution"
*.vehicle[0..9].attackParameters = "{\"unpopularContent\":true, \"requestRate\":50}"

#
# Attack #4: Cache Privacy/Timing Attacks
#
[Config Attack04_CacheTimingAttack]
extends = AttackScenario_Base
description = "Attack #4: Cache Privacy/Timing Attack - Cache Probing"
*.vehicle[0..4].attackType = "CacheTimingAttack"
*.vehicle[0..4].attackModuleType = "veremivndn.attacks.privacy.CacheTimingAttack"
*.vehicle[0..4].attackParameters = "{\"probeInterval\":0.05, \"targetContent\":\"/traffic/accident\", \"probeCount\":10, \"mode\":\"timing\", \"measurePrecision\":true}"

#
# Attack #5: Name Prefix Hijacking
#
[Config Attack05_NamePrefixHijacking]
extends = AttackScenario_Base
description = "Attack #5: Name Prefix Hijacking - Route Hijack"
*.vehicle[0..9].attackType = "NamePrefixHijacking"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.networks.NamePrefixHijacking"
*.vehicle[0..9].attackParameters = "{\"hijackedPrefix\":\"/safety\", \"advertiseFake\":true, \"interceptTraffic\":true, \"mode\":\"intercept\", \"advertisementRate\":10, \"hopCountLie\":1}"

#
# Attack #6: Sybil Content Amplification
#
[Config Attack06_SybilAmplification]
extends = AttackScenario_Base
description = "Attack #6: Sybil Content Amplification - Multiple Identities"
*.vehicle[0..9].attackType = "SybilAmplification"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.trust.SybilAmplification"
*.vehicle[0..9].attackParameters = "{\"numSybilIds\":10, \"coordinatedRequests\":true}"

#
# Attack #7: Interest/Content Replay
#
[Config Attack07_ReplayAttack]
extends = AttackScenario_Base
description = "Attack #7: Interest/Content Replay - Stale Content"
*.vehicle[0..9].attackType = "ReplayAttack"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.data.ReplayAttack"
*.vehicle[0..9].attackParameters = "{\"replayDelay\":30, \"targetPrefix\":\"/safety\", \"ignoreTimestamp\":true, \"replayCount\":3, \"target\":\"both\"}"

#
# Attack #8: Selective Forwarding (Gray Hole)
#
[Config Attack08_SelectiveForwarding]
extends = AttackScenario_Base
description = "Attack #8: Selective Forwarding (Gray Hole) - Partial DoS"
*.vehicle[0..9].attackType = "SelectiveForwarding"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.crosslayer.SelectiveForwarding"
*.vehicle[0..9].attackParameters = "{\"dropProbability\":0.7, \"targetType\":\"safety\", \"selectiveDelay\":false, \"targetPrefix\":\"/safety\", \"dropInterest\":true, \"dropData\":true}"

#
# Attack #9: Collusion
#
[Config Attack09_Collusion]
extends = AttackScenario_Base
description = "Attack #9: Collusion - Cooperative Misbehavior"
*.vehicle[0..9].attackType = "Collusion"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.trust.Collusion"
*.vehicle[0..9].attackParameters = "{\"collusionGroup\":\"group1\", \"coordinatedAttack\":\"ContentPoisoning\", \"synchronize\":true, \"shareTargets\":true, \"trustBoost\":true}"

#
# Attack #10: Signature Forgery
#
[Config Attack10_SignatureForgery]
extends = AttackScenario_Base
description = "Attack #10: Signature Forgery - Key Compromise"
*.vehicle[0..9].attackType = "SignatureForgery"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.trust.SignatureForgery"
*.vehicle[0..9].attackIntensity = 0.8
*.vehicle[0..9].attackParameters = "{\"forgeSignatures\":true, \"compromisedKeys\":\"producer1\", \"validSignature\":false, \"targetPrefix\":\"/traffic\", \"forgeryRate\":20}"

#
# Attack #11: Privacy De-anonymization
#
[Config Attack11_PrivacyDeanonymization]
extends = AttackScenario_Base
description = "Attack #11: Privacy De-anonymization - Name Semantics"
*.vehicle[0..9].attackType = "PrivacyDeanonymization"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.privacy.PrivacyDeanonymization"
*.vehicle[0..9].attackParameters = "{\"collectNames\":true, \"inferLocation\":true, \"buildProfiles\":true, \"analysisInterval\":5.0}"

#
# Attack #12: Interest Aggregation Attack
#
[Config Attack12_InterestAggregation]
extends = AttackScenario_Base
description = "Attack #12: Interest Aggregation Attack - PIT Clogging"
*.vehicle[0..9].attackType = "InterestAggregation"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.networks.InterestAggregation"
*.vehicle[0..9].attackParameters = "{\"craftedAggregation\":true, \"resourceImbalance\":true, \"targetPrefix\":\"/traffic\", \"aggregationRate\":50}"

#
# Attack #13: Cache Invalidation
#
[Config Attack13_CacheInvalidation]
extends = AttackScenario_Base
description = "Attack #13: Cache Invalidation - Malicious Cache Churn"
*.vehicle[0..9].attackType = "CacheInvalidation"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.data.CacheInvalidation"
*.vehicle[0..9].attackParameters = "{\"rapidVersions\":true, \"invalidationRate\":10, \"forceCacheEviction\":true, \"targetPrefix\":\"/traffic\", \"versionIncrement\":0.1}"

#
# Attack #14: Cross-Layer Jamming
#
[Config Attack14_RadioJamming]
extends = AttackScenario_Base
description = "Attack #14: Cross-Layer Jamming - PHY Interference"
*.vehicle[0..9].attackType = "RadioJamming"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.crosslayer.RadioJamming"
*.vehicle[0..9].attackIntensity = 0.9
*.vehicle[0..9].attackParameters = "{\"jammingPower\":30, \"dutyCycle\":0.8, \"targetChannel\":178, \"jammingType\":\"CONSTANT\", \"range\":200.0}"

#
# Attack #15: Content Privacy Leakage
#
[Config Attack15_CachePrivacyLeakage]
extends = AttackScenario_Base
description = "Attack #15: Content Privacy Leakage - Cache Sharing"
*.vehicle[0..9].attackType = "CachePrivacyLeakage"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.caching.CachePrivacyLeakage"
*.vehicle[0..9].attackParameters = "{\"shareCache\":true, \"leakRequests\":true, \"collectHistory\":true, \"probeInterval\":2.0}"

#
# Attack #16: Producer Impersonation
#
[Config Attack16_ProducerImpersonation]
extends = AttackScenario_Base
description = "Attack #16: Producer Impersonation - Fake Producer"
*.vehicle[0..9].attackType = "ProducerImpersonation"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.data.ProducerImpersonation"
*.vehicle[0..9].attackIntensity = 0.8
*.vehicle[0..9].attackParameters = "{\"impersonateId\":\"rsu[0]\", \"fakePrefix\":\"/traffic\", \"bypassAuth\":true, \"productionRate\":30, \"advertiseFake\":true}"

#
# Attack #17: Content Availability Manipulation
#
[Config Attack17_CachePartitioning]
extends = AttackScenario_Base
description = "Attack #17: Content Availability Manipulation - Cache Partitioning"
*.vehicle[0..9].attackType = "CachePartitioning"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.caching.CachePartitioning"
*.vehicle[0..9].attackIntensity = 0.8
*.vehicle[0..9].attackParameters = "{\"partitionZone\":\"east\", \"limitAccess\":true, \"controlRelays\":true, \"targetPrefix\":\"/traffic\", \"isolationLevel\":0.8}"

#
# Attack #18: Routing Information Flood
#
[Config Attack18_RoutingInfoFlood]
extends = AttackScenario_Base
description = "Attack #18: Routing Information Flood - FIB/PIT Spoof"
*.vehicle[0..9].attackType = "RoutingInfoFlood"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.networks.RoutingInfoFlood"
*.vehicle[0..9].attackIntensity = 0.9
*.vehicle[0..9].attackParameters = "{\"fibUpdateRate\":100, \"spoofEntries\":true, \"fakeRoutes\":true, \"targetRouter\":\"all\", \"floodIntensity\":0.9}"

#
# Attack #19: Name Enumeration
#
[Config Attack19_NameEnumeration]
extends = AttackScenario_Base
description = "Attack #19: Name Enumeration - Privacy Crawling"
*.vehicle[0..9].attackType = "NameEnumeration"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.privacy.NameEnumeration"
*.vehicle[0..9].attackParameters = "{\"probeNames\":true, \"discoverPopular\":true, \"buildDirectory\":true, \"probeRate\":50, \"targetNamespace\":\"/\"}"

#
# Attack #20: Machine Learning Evasion
#
[Config Attack20_MLEvasion]
extends = AttackScenario_Base
description = "Attack #20: Machine Learning Evasion - Adversarial Examples"
*.vehicle[0..9].attackType = "MLEvasion"
*.vehicle[0..9].attackModuleType = "veremivndn.attacks.crosslayer.MLEvasion"
*.vehicle[0..9].attackParameters = "{\"adversarialPattern\":true, \"evasionTechnique\":\"gradient-based\", \"targetModel\":\"RandomForest\", \"perturbationLevel\":0.3, \"mimicBenign\":true}"

######################################################################
# COMBINED ATTACK SCENARIOS
######################################################################

#
# [Config MultiAttackScenario]
# Multiple simultaneous attacks
#
[Config MultiAttackScenario]
extends = BasicVNDN
description = "Multiple simultaneous attacks for IDS stress testing"
*.numMaliciousVehicles = 20

# Attack Type and Module Type mapping (CRITICAL for signal synchronization)
*.vehicle[0..4].attackType = "InterestFlooding"
*.vehicle[0..4].attackModuleType = "veremivndn.attacks.networks.InterestFlooding"

*.vehicle[5..9].attackType = "ContentPoisoning"
*.vehicle[5..9].attackModuleType = "veremivndn.attacks.data.ContentPoisoning"

*.vehicle[10..14].attackType = "SybilAmplification"
*.vehicle[10..14].attackModuleType = "veremivndn.attacks.trust.SybilAmplification"

*.vehicle[15..19].attackType = "SelectiveForwarding"
*.vehicle[15..19].attackModuleType = "veremivndn.attacks.crosslayer.SelectiveForwarding"

*.vehicle[0..19].hasAttackModule = true
*.vehicle[0..19].attackStartTime = uniform(60s, 90s)
*.vehicle[0..19].attackDuration = 120s
*.vehicle[0..19].attackIntensity = uniform(0.5, 0.9)

#
# [Config UrbanAttackScenario]
# Attack scenario in urban environment
#
[Config UrbanAttackScenario]
extends = Attack01_InterestFlooding
network = veremivndn.simulations.scenarios.UrbanVndnNetwork
description = "Interest Flooding attack in urban scenario"
*.manager.launchConfig = xmldoc("../scenarios/sumo/urban_enhanced.launchd.xml")
*.numVehicles = 100
*.numRSU = 10
*.playgroundSizeX = 15000m
*.playgroundSizeY = 16000m

#
# [Config HighwayAttackScenario]
# Attack scenario on highway
#
[Config HighwayAttackScenario]
extends = Attack02_ContentPoisoning
network = veremivndn.simulations.scenarios.HighwayVndnNetwork
description = "Content Poisoning attack on highway"
*.manager.launchConfig = xmldoc("../scenarios/sumo/highway_enhanced.launchd.xml")
*.numVehicles = 150
*.numRSU = 8
*.playgroundSizeX = 15000m
*.playgroundSizeY = 16000m

#
# [Config EnhancedAljubail]
# Enhanced Aljubail scenario with advanced SUMO visualization
#
[Config EnhancedAljubail]
extends = BasicVNDN
network = veremivndn.simulations.scenarios.VndnNetwork
description = "Enhanced Aljubail with multiple vehicle types and advanced visualization"
*.manager.launchConfig = xmldoc("../scenarios/sumo/aljubail_enhanced.launchd.xml")
*.numVehicles = 500
*.numRSU = 20
sim-time-limit = 2000s

######################################################################
# IDS EVALUATION SCENARIOS
######################################################################

#
# [Config IDSEvaluation]
# IDS performance evaluation
#
[Config IDSEvaluation]
extends = MultiAttackScenario
description = "IDS evaluation with multiple attack types"
sim-time-limit = 2000s
*.vehicle[*].idsDetectionMethod = "Hybrid"
*.vehicle[*].idsLogging = true

# Output detailed logs for ML training
output-vector-file = ${resultdir}/ids_eval-${runnumber}.vec
output-scalar-file = ${resultdir}/ids_eval-${runnumber}.sca
