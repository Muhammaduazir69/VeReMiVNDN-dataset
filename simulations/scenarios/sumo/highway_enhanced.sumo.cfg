<?xml version="1.0" encoding="UTF-8"?>
<!--
    VeReMiVNDN - Enhanced Highway Scenario Configuration

    Highway environment with:
    - High-speed traffic (cars, trucks, buses, motorcycles)
    - Long-distance routes
    - Lane changes and overtaking
    - Emergency vehicles
-->
<configuration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="http://sumo.dlr.de/xsd/sumoConfiguration.xsd">

    <input>
        <net-file value="aljubail_saudi.net.xml"/>
        <route-files value="vTypes.add.xml,highway_enhanced.rou.xml"/>
        <additional-files value="aljubail_zones.poly.xml"/>
    </input>

    <time>
        <begin value="0"/>
        <end value="600"/>
        <step-length value="0.1"/>
    </time>

    <processing>
        <collision.action value="warn"/>
        <collision.check-junctions value="true"/>
        <time-to-teleport value="-1"/>
        <max-depart-delay value="900"/>

        <!-- Highway-specific: higher lateral resolution for lane changes -->
        <lateral-resolution value="1.0"/>

        <!-- No pedestrians on highway -->
        <pedestrian.model value="nonInteracting"/>
    </processing>

    <routing>
        <!-- Higher rerouting for highway -->
        <device.rerouting.probability value="0.95"/>
        <device.rerouting.adaptation-steps value="120"/>
        <device.rerouting.adaptation-interval value="15"/>
        <routing-algorithm value="dijkstra"/>
    </routing>

    <report>
        <verbose value="true"/>
        <no-step-log value="true"/>
        <duration-log.statistics value="true"/>
    </report>

    <emissions>
        <device.emissions.probability value="1.0"/>
    </emissions>

    <output>
        <summary-output value="highway_summary.xml"/>
        <tripinfo-output value="highway_tripinfo.xml"/>
        <statistic-output value="highway_statistics.xml"/>
    </output>

    <random_number>
        <seed value="56"/>
    </random_number>

</configuration>
