<?xml version="1.0" encoding="UTF-8"?>
<!--
    VeReMiVNDN - Enhanced Urban Scenario Configuration

    Urban environment with:
    - Mixed traffic (cars, buses, delivery trucks, bicycles, pedestrians)
    - Lower speeds, frequent stops
    - Traffic lights and intersections
    - Pedestrian crossings
-->
<configuration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="http://sumo.dlr.de/xsd/sumoConfiguration.xsd">

    <input>
        <net-file value="aljubail_saudi.net.xml"/>
        <route-files value="vTypes.add.xml,urban_enhanced.rou.xml"/>
        <additional-files value="aljubail_zones.poly.xml"/>
    </input>

    <time>
        <begin value="0"/>
        <end value="600"/>
        <step-length value="0.1"/>
    </time>

    <processing>
        <collision.action value="warn"/>
        <collision.check-junctions value="true"/>
        <time-to-teleport value="-1"/>
        <max-depart-delay value="600"/>
        <lateral-resolution value="0.8"/>

        <!-- Urban-specific: pedestrian model -->
        <pedestrian.model value="striping"/>
        <pedestrian.striping.stripe-width value="0.65"/>
        <pedestrian.striping.dawdling value="0.3"/>
        <pedestrian.striping.jamtime value="10"/>
    </processing>

    <routing>
        <device.rerouting.probability value="0.9"/>
        <device.rerouting.adaptation-steps value="90"/>
        <device.rerouting.adaptation-interval value="5"/>
        <routing-algorithm value="dijkstra"/>
    </routing>

    <report>
        <verbose value="true"/>
        <no-step-log value="true"/>
        <duration-log.statistics value="true"/>
    </report>

    <emissions>
        <device.emissions.probability value="1.0"/>
    </emissions>

    <output>
        <summary-output value="urban_summary.xml"/>
        <tripinfo-output value="urban_tripinfo.xml"/>
        <statistic-output value="urban_statistics.xml"/>
    </output>

    <random_number>
        <seed value="23"/>
    </random_number>

</configuration>
